# Redocly lint config for the frontend (operator/fleet) REST contract.
# Starts from the recommended ruleset, with two intentional exceptions:
extends:
  - recommended
rules:
  # This is an internal cross-component contract; licensing is covered by the repo LICENSE.md,
  # not per-document (same posture as the controller-rest contract).
  info-license: off
  # The fleet list (GET /api/greenhouses) and activity feed (GET /api/events) always return a
  # collection — they have no 4XX path — so they legitimately have no 4XX response.
  operation-4xx-response: off
  # security-defined stays ON: 2b operations reference the declared `bearerAuth` scheme and 2a
  # operations declare `security: []` (explicitly unauthenticated on the trusted Docker network,
  # RFC-009).
