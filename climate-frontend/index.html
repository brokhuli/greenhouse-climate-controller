<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenhouse Climate Dashboard</title>
    <!--
      Set the theme before first paint so there is no flash of the wrong palette.
      Mirrors the ThemeProvider's resolution order: saved choice, then OS preference,
      then dark (the control-room default). See styles/tokens.css + app/providers.tsx.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
          document.documentElement.setAttribute(
            "data-theme",
            saved || (prefersLight ? "light" : "dark"),
          );
        } catch (_e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
