# Mosquitto configuration for the local greenhouse stack (Phase 1).
#
# eclipse-mosquitto:2 defaults to a local-only listener with anonymous access
# disabled, so both the listener and allow_anonymous must be set explicitly for
# the natively-run controller on the host to connect at localhost:1883.
# See RFC-001 (MQTT broker selection): anonymous auth for local dev, QoS 1 +
# retained messages (client/protocol behaviors), persistence enabled so retained
# and in-flight QoS state survive broker restarts.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
