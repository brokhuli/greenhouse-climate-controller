# The platform's single entry point (platform architecture §4, RFC-003). This file is included
# within nginx's http{} block (via conf.d/*.conf), so the upgrade map and the server both live here.
#   /            → the built React SPA (static assets + index.html deep-link fallback)
#   /api/        → the Go API (REST + the /api/stream WebSocket upgrade)
#   /auth/       → Keycloak (OIDC login / token / JWKS), path preserved

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # REST + WebSocket → Go API. proxy_pass without a URI keeps the /api prefix the API serves under.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for /api/stream (long-lived).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # OIDC → Keycloak. Path preserved (Keycloak serves under /auth); forwarded headers let it build
    # correct absolute URLs behind the proxy (KC_PROXY_HEADERS=xforwarded + KC_HOSTNAME_BACKCHANNEL_DYNAMIC).
    # X-Forwarded-Port must be the *published* host port (8080), not nginx's internal listen port (80),
    # or Keycloak advertises browser-facing backchannel URLs (token/JWKS) on :80 → the SPA's token
    # exchange hits http://localhost:80 and fails ("Failed to fetch"). The API reaches Keycloak
    # directly at auth:8080 (no proxy, no X-Forwarded), so its backchannel URLs stay internal.
    location /auth/ {
        proxy_pass http://auth:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8080;
    }

    # SPA: serve hashed static assets; fall back to index.html so client-side deep links resolve.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
