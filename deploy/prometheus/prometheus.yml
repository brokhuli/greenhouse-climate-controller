# Prometheus scrape config for the local greenhouse stack (operations §1).
#
# Two sources of platform-wide observability:
#   - platform-api : the Go API's /metrics (platform-health) — a single static target.
#   - controllers  : every generated Phase 1 controller's own /metrics (controller-health),
#                    discovered via file-based service discovery. gen-controllers.sh writes
#                    ./prometheus/targets/controllers.json (git-ignored) each time it regenerates
#                    the fleet; Prometheus hot-reloads it, so scaling N needs no config change here.
#
# All scraping is over the internal Docker network; nothing is exposed through the nginx proxy.

global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: platform-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: controllers
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json

  # cAdvisor — container-resource metrics (container_*) for every service in the stack: a single
  # static target, unlike the dynamic controllers. See the "Container Resources" Grafana dashboard.
  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  # (Phase 3) The optimizer will expose its own /metrics (optimizer-health) and join here as a third
  # job once it lands — see docs/specs/design/optimizer/10-spec-optimizer-interfaces.md. It is not
  # built or containerized yet, so this stays commented (no live target).
  # - job_name: optimizer
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["optimizer:8000"]
