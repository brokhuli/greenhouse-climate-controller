# Greenhouse "Verdant" login theme.
#
# Extends Keycloak's classic `keycloak` login theme (PatternFly-3 markup, plain-CSS
# friendly) and layers one override stylesheet on top so the sign-in page matches the
# React console's visual language (see climate-frontend/src/styles/tokens.css).
#
# `styles` fully replaces the parent's list, so we re-list the base `css/login.css`
# (resolved from the parent theme) and append `css/greenhouse.css` — loaded last, so
# our rules win. `import=common/keycloak` mirrors the parent and pulls in the shared
# PatternFly resources.
parent=keycloak
import=common/keycloak
styles=css/login.css css/greenhouse.css
