# Auto-provision the platform, controller, container, and optimizer dashboards from files mounted at
# /var/lib/grafana/dashboards (operations §1).
apiVersion: 1

providers:
  - name: greenhouse
    orgId: 1
    folder: Greenhouse
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
