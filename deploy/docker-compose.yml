# Local greenhouse stack — Docker Compose.
#
# The platform: the MQTT broker, TimescaleDB, the Go `api`, Keycloak (`auth`, OIDC), and the nginx
# `proxy` — the single entry point that serves the built SPA and reverse-proxies /api and /auth
# (platform architecture §4). Everything is reached at http://localhost:8080; the api is not exposed
# directly. The Phase 1 controllers are generated into docker-compose.override.yml by
# `scripts/gen-controllers.sh N`; `docker compose up -d` reconciles platform + N controllers in one
# command (operations §2).
#
# Auth is on: writes require an operator token. Log in at http://localhost:8080 as operator/operator
# or viewer/viewer; scripts/curl fetch a token via `deploy/scripts/get-token.sh`.
#
# Run (from the repo root):
#   cp deploy/.env.example deploy/.env            # set POSTGRES_PASSWORD + KEYCLOAK_ADMIN_PASSWORD
#   bash deploy/scripts/gen-controllers.sh 2      # generate 2 controllers + register.sh
#   docker compose --env-file deploy/.env \
#       -f deploy/docker-compose.yml -f deploy/docker-compose.override.yml up -d --build
#   bash deploy/controllers/register.sh           # register the greenhouses (fetches an operator token)
#
# (With an explicit -f the override is not auto-loaded, so pass both files.)
name: greenhouse

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: greenhouse-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT — native controller (Phase 1 standalone) can still connect at localhost:1883
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data # retained + in-flight QoS state (survives restarts)
      - mosquitto_log:/mosquitto/log
    healthcheck:
      # Broker is healthy if it answers a subscribe on its own $SYS tree.
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  db: # (2a) TimescaleDB — relational registry + time-series telemetry
    image: timescale/timescaledb:latest-pg16
    container_name: greenhouse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenhouse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deploy/.env}
      POSTGRES_DB: greenhouse
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse -d greenhouse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api: # (2a) Go + Echo — ingestion, fleet mgmt, setpoint relay, WS fan-out
    build: ../climate-platform
    image: greenhouse-platform:latest
    container_name: greenhouse-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      auth: # (2b) wait until Keycloak's realm discovery is actually served (healthcheck below), so the
        # verifier's OIDC discovery can't lose the boot race on a cold realm import; the verifier still
        # retries as a backstop
        condition: service_healthy
    environment:
      PLATFORM_DATABASE_URL: postgres://greenhouse:${POSTGRES_PASSWORD:?set in deploy/.env}@db:5432/greenhouse?sslmode=disable
      PLATFORM_MQTT_BROKER_URL: tcp://mqtt:1883
      PLATFORM_HTTP_ADDR: ":8080"
      PLATFORM_RETENTION_DAYS: "30"
      # (2b) OIDC auth. Setting the issuer turns human viewer/operator auth on (platform security §2).
      # The issuer (token `iss`) is the browser-facing URL; discovery/JWKS are fetched on the internal
      # Docker network, reconciled by KC_HOSTNAME_BACKCHANNEL_DYNAMIC + oidc.InsecureIssuerURLContext.
      PLATFORM_OIDC_ISSUER_URL: http://localhost:8080/auth/realms/greenhouse
      PLATFORM_OIDC_DISCOVERY_URL: http://auth:8080/auth/realms/greenhouse
      PLATFORM_OIDC_AUDIENCE: climate-api
      # (RFC-011) Optimizer → POST /setpoints service-auth boundary, dormant by default. `oidc`
      # requires a Keycloak `setpoints:write` client-credentials token (the `optimizer` realm
      # client) and needs the OIDC issuer above set; `trusted_network` (default) accepts it untokened.
      PLATFORM_SERVICE_AUTH_MODE: trusted_network
    # No host port: the nginx `proxy` is the single entry point (platform architecture §4).
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  auth: # (2b) Keycloak — self-hosted OIDC identity provider (platform security §1)
    image: quay.io/keycloak/keycloak:26.1
    container_name: greenhouse-auth
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set in deploy/.env}
      # Serve under /auth and pin the browser-facing issuer to include that path (so the token `iss`
      # is http://localhost:8080/auth/realms/greenhouse, matching the SPA authority + api issuer);
      # resolve backchannel (JWKS/token) URLs from the request host so the in-network api reaches
      # them (platform security §5).
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8080/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      # Keycloak's image ships bash but no curl/wget, so probe the realm's OIDC discovery endpoint
      # over bash's /dev/tcp: "healthy" means the realm is imported and discovery is actually being
      # served (not merely that the port is open) — exactly what the api's verifier needs.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf "GET /auth/realms/greenhouse/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -n1 <&3 | grep -q 200'
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  proxy: # (2a frontend + 2b) nginx — single entry point: serves the built SPA and reverse-proxies
    # /api (REST + WS) and /auth (Keycloak). Consolidates the spec's `proxy` + `frontend` into one
    # nginx image ("the React app served by the proxy nginx", operations §2).
    build:
      context: ../climate-frontend
    image: greenhouse-frontend:latest
    container_name: greenhouse-proxy
    restart: unless-stopped
    depends_on:
      - api
      - auth
    ports:
      - "8080:80" # the only exposed port
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  prometheus: # (2b) scrapes the api's /metrics (platform-health) and every controller's /metrics
    # (controller-health) over the internal network — nothing extra is exposed via the proxy
    # (operations §1). The api is a static target; the generated controllers are discovered via the
    # file-SD targets file that gen-controllers.sh writes into ./prometheus/targets/.
    image: prom/prometheus:v3.1.0
    container_name: greenhouse-prometheus
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "9090:9090" # Prometheus UI (host) — handy for /targets debugging; scraping is internal
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro # file-SD (generated, git-ignored)
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  grafana: # (2b) platform + controller dashboards over Prometheus (operations §1). Dashboards and the
    # Prometheus datasource are auto-provisioned from ./grafana/; the admin login is GRAFANA_ADMIN[_PASSWORD].
    image: grafana/grafana:11.4.0
    container_name: greenhouse-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000" # Grafana UI (host)
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Anonymous read-only access — open the dashboards with no login (local dev). The admin login
      # above still gates edits; anonymous users get the Viewer role.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  mosquitto_data:
  mosquitto_log:
  db_data: # (2a) TimescaleDB data
  prometheus_data: # (2b) Prometheus TSDB
  grafana_data: # (2b) Grafana state (dashboards are provisioned read-only; this holds its own db)
