# Local greenhouse stack — Docker Compose.
#
# Phase 2a brings up the telemetry pipeline: the MQTT broker, TimescaleDB, and the Go
# platform API. The React SPA and its nginx `proxy` are a later slice, so the `api` is
# exposed on a host port directly here instead of behind the proxy. The Phase 1
# controllers are generated into docker-compose.override.yml by
# `scripts/gen-controllers.sh N`; `docker compose up -d` reconciles platform + N
# controllers in one command (operations §2).
#
# Run (from the repo root):
#   cp deploy/.env.example deploy/.env            # set POSTGRES_PASSWORD
#   bash deploy/scripts/gen-controllers.sh 2      # generate 2 controllers + register.sh
#   docker compose --env-file deploy/.env \
#       -f deploy/docker-compose.yml -f deploy/docker-compose.override.yml up -d --build
#   bash deploy/controllers/register.sh           # register the greenhouses with the API
#
# (With an explicit -f the override is not auto-loaded, so pass both files.)
name: greenhouse

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: greenhouse-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT — native controller (Phase 1 standalone) can still connect at localhost:1883
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data # retained + in-flight QoS state (survives restarts)
      - mosquitto_log:/mosquitto/log
    healthcheck:
      # Broker is healthy if it answers a subscribe on its own $SYS tree.
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  db: # (2a) TimescaleDB — relational registry + time-series telemetry
    image: timescale/timescaledb:latest-pg16
    container_name: greenhouse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenhouse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deploy/.env}
      POSTGRES_DB: greenhouse
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse -d greenhouse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api: # (2a) Go + Echo — ingestion, fleet mgmt, setpoint relay, WS fan-out
    build: ../climate-platform
    image: greenhouse-platform:latest
    container_name: greenhouse-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    environment:
      PLATFORM_DATABASE_URL: postgres://greenhouse:${POSTGRES_PASSWORD:?set in deploy/.env}@db:5432/greenhouse?sslmode=disable
      PLATFORM_MQTT_BROKER_URL: tcp://mqtt:1883
      PLATFORM_HTTP_ADDR: ":8080"
      PLATFORM_RETENTION_DAYS: "30"
    ports:
      - "8080:8080" # REST + WebSocket — proxied behind nginx once the SPA lands (2a frontend slice)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # --- Later slices (placeholders — see 08-spec-platform-operations.md §2 Deployment) ---
  # frontend: # (2a frontend) React SPA — built and served by the proxy
  #   build: ../climate-frontend
  #
  # proxy:    # (2a frontend) nginx — single entry point: serves the SPA, proxies /api (+ /auth in 2b)
  #   image: nginx:stable
  #   depends_on: [api, frontend]
  #   ports:
  #     - "8080:80"
  #
  # auth:        # (2b) Keycloak — self-hosted OIDC identity provider
  #   image: quay.io/keycloak/keycloak:latest
  #   command: ["start-dev"]
  #
  # prometheus:  # (2b) scrapes the api's /metrics
  #   image: prom/prometheus:latest
  #
  # grafana:     # (2b) platform dashboards over Prometheus
  #   image: grafana/grafana:latest

volumes:
  mosquitto_data:
  mosquitto_log:
  db_data: # (2a) TimescaleDB data
