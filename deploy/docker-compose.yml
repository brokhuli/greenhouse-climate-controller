# Local greenhouse stack — Docker Compose.
#
# Phase 1: the only LIVE service is `mqtt` (Mosquitto). The Phase 1 controller runs as a
# native Windows binary (controller spec §13), not a container, and connects to the broker
# at localhost:1883. The Phase 2 platform services below are commented-out placeholders —
# the full topology is documented in 08-spec-platform-operations.md (§2 Deployment); they are activated when
# Phase 2 begins (api/frontend need source + Dockerfiles that do not exist yet, and the rest
# is Phase 2/2b infrastructure with nothing to serve until then).
#
# Run:  docker compose -f deploy/docker-compose.yml up -d
name: greenhouse

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: greenhouse-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT — native controller connects here at localhost:1883
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data # retained + in-flight QoS state (survives restarts)
      - mosquitto_log:/mosquitto/log
    healthcheck:
      # Broker is healthy if it answers a subscribe on its own $SYS tree.
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # --- Phase 2 platform services (placeholders — see 08-spec-platform-operations.md §2 Deployment) ---
  # Uncomment and complete as each lands. Slice tags: (2a) MVP pipeline, (2b) auth + observability.
  #
  # db:          # (2a) TimescaleDB — relational registry + crop profiles + time-series telemetry
  #   image: timescale/timescaledb:latest-pg16
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #
  # api:         # (2a) Go + Echo — ingestion, fleet mgmt, setpoint relay, WS fan-out
  #   build: ../climate-platform
  #   depends_on: [db, mqtt]
  #
  # frontend:    # (2a) React SPA — built and served by the proxy
  #   build: ../climate-platform/frontend
  #
  # proxy:       # (2a) nginx — single entry point: serves the SPA, proxies /api (+ /auth in 2b)
  #   image: nginx:stable
  #   depends_on: [api, frontend]
  #   ports:
  #     - "8080:80"
  #
  # auth:        # (2b) Keycloak — self-hosted OIDC identity provider
  #   image: quay.io/keycloak/keycloak:latest
  #   command: ["start-dev"]
  #
  # prometheus:  # (2b) scrapes the api's /metrics
  #   image: prom/prometheus:latest
  #
  # grafana:     # (2b) platform dashboards over Prometheus
  #   image: grafana/grafana:latest

volumes:
  mosquitto_data:
  mosquitto_log:
  # db_data:   # (2a) uncomment with the db service above
