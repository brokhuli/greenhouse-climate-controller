name: CI

# Clean-environment gate (RFC-010 / spec-verification.md §6). Re-runs, away from a
# developer's machine, the same gates the local .githooks/pre-commit hook fires —
# the Rust gate and the contract-validation harness. The frontend gate (lint /
# typecheck / unit tests + blocking Lighthouse CI against the static production
# build) also runs here; its Playwright E2E stays local (needs the live stack).
# Remaining per-phase gates (Python/load) and coverage enforcement land with the
# phases they verify.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust gate (climate-controller)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-controller
    steps:
      - uses: actions/checkout@v4

      # rustup (preinstalled on ubuntu-latest) honors climate-controller/rust-toolchain.toml,
      # which pins channel 1.96.0 with the rustfmt + clippy components — no setup action needed.
      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            climate-controller/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('climate-controller/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Typecheck
        run: cargo check --all-targets
      - name: Test
        run: cargo test

  go:
    name: Go gate (climate-platform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: climate-platform/go.sum

      - name: Format
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: climate-platform
      - name: Build
        run: go build ./...
      # Unit tests only; DB-backed integration tests are behind the `integration`
      # build tag and run in their own job (Docker available) — see M6.
      - name: Test
        run: go test ./...

  go-integration:
    name: Go integration (TimescaleDB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: climate-platform/go.sum

      # testcontainers spins up a real TimescaleDB (Docker is available on the runner)
      # to verify migrations, the hypertable/retention setup, and the range/analytics SQL.
      - name: Integration tests
        run: go test -tags integration ./test/... -timeout 360s

  contracts:
    name: Contract conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install harness dependencies
        run: npm ci
      - name: Validate schemas + fixtures
        run: npm run validate:contracts

  frontend:
    name: Frontend gate (climate-frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-frontend
    steps:
      - uses: actions/checkout@v4

      # Honors climate-frontend/.nvmrc (Node 24 — the pinned build toolchain),
      # not the contracts job's Node 20.
      - uses: actions/setup-node@v4
        with:
          node-version-file: climate-frontend/.nvmrc
          cache: npm
          cache-dependency-path: climate-frontend/package-lock.json

      - name: Install
        run: npm ci
      - name: Format
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      # Production build feeds the Lighthouse gate (staticDistDir: ./dist).
      - name: Build
        run: npm run build
      # Lighthouse CI (@lhci/cli) against the static production build — initial-load
      # (< 2 s, P2-USE-1) + accessibility; thresholds in .lighthouserc.json fail the
      # build (P2-TEST-2). E2E (Playwright) needs the live stack and runs locally.
      - name: Lighthouse
        run: npx lhci autorun
